name: Deploy Backend to Render

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'database/**'
      - 'requirements.txt'
      - 'render.yaml'
      - '.github/workflows/deploy-backend-render.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret is required"
            exit 1
          fi

          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Wait for backend health endpoint
        env:
          RENDER_HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
        run: |
          if [ -z "$RENDER_HEALTHCHECK_URL" ]; then
            echo "RENDER_HEALTHCHECK_URL secret is required"
            exit 1
          fi

          for i in {1..60}; do
            if curl -fsS "$RENDER_HEALTHCHECK_URL" | jq -e '.status == "ok"' >/dev/null; then
              echo "Backend health check is passing"
              exit 0
            fi
            echo "Waiting for Render deploy to become healthy... (${i}/60)"
            sleep 10
          done

          echo "Backend health check did not pass in time"
          exit 1
