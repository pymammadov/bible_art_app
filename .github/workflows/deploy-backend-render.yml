name: deploy backend to Render

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'database/**'
      - 'requirements.txt'
      - 'render.yaml'
      - '.github/workflows/deploy-backend-render.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not configured"
            exit 1
          fi

          curl --fail --show-error --silent --location --request POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Wait for Render health check
        env:
          RENDER_HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
        run: |
          if [ -z "$RENDER_HEALTHCHECK_URL" ]; then
            echo "RENDER_HEALTHCHECK_URL is not configured"
            exit 1
          fi

          for attempt in {1..30}; do
            if curl --fail --show-error --silent "$RENDER_HEALTHCHECK_URL" > /dev/null; then
              echo "Render service is healthy."
              exit 0
            fi
            echo "Attempt ${attempt}/30: service not healthy yet, retrying in 10s..."
            sleep 10
          done

          echo "Render health check failed after waiting."
          exit 1
